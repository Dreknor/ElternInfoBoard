<svg xmlns="http://www.w3.org/2000/svg" width="220" height="130" viewBox="0 0 220 130">
  <!-- Background -->
  <rect width="220" height="130" fill="#0f172a" rx="4"/>

  <!-- Sidebar (color-sidebar-bg = #0f172a, use #0b1220 for contrast) -->
  <rect x="0" y="0" width="48" height="130" fill="#0b1220" rx="4 0 0 4"/>

  <!-- Sidebar logo area (color-primary = #3b82f6 as logo box) -->
  <rect x="6" y="8" width="36" height="18" fill="#3b82f6" rx="3" opacity="0.9"/>
  <text x="24" y="20" text-anchor="middle" font-size="7" font-family="sans-serif" fill="white" font-weight="bold">APP</text>

  <!-- Sidebar menu items (active tint + blue indicator) -->
  <rect x="6" y="32" width="36" height="7" fill="#3b82f6" rx="2" opacity="0.2"/>
  <rect x="6" y="32" width="3" height="7" fill="#3b82f6" rx="1"/>
  <!-- inactive (color-sidebar-text = #cbd5e1) -->
  <rect x="6" y="43" width="28" height="5" fill="#cbd5e1" rx="2" opacity="0.4"/>
  <rect x="6" y="52" width="32" height="5" fill="#cbd5e1" rx="2" opacity="0.4"/>
  <rect x="6" y="61" width="24" height="5" fill="#cbd5e1" rx="2" opacity="0.4"/>
  <rect x="6" y="70" width="30" height="5" fill="#cbd5e1" rx="2" opacity="0.4"/>
  <rect x="6" y="79" width="26" height="5" fill="#cbd5e1" rx="2" opacity="0.4"/>

  <!-- Navbar (color-navbar-bg = #1e293b) -->
  <rect x="48" y="0" width="172" height="22" fill="#1e293b" rx="0 4 0 0"/>
  <line x1="48" y1="22" x2="220" y2="22" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
  <!-- Navbar avatar -->
  <circle cx="208" cy="11" r="7" fill="#3b82f6" opacity="0.8"/>
  <!-- Navbar title -->
  <rect x="56" y="8" width="60" height="6" fill="#f8fafc" rx="2" opacity="0.6"/>

  <!-- Row 1: stat cards (color-card-bg = #1e293b) -->
  <rect x="54" y="28" width="46" height="26" fill="#1e293b" rx="3" stroke="#64748b" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="57" y="31" width="20" height="4" fill="#3b82f6" rx="1" opacity="0.7"/>
  <rect x="57" y="38" width="30" height="5" fill="#f8fafc" rx="1" opacity="0.5"/>
  <rect x="57" y="45" width="14" height="3" fill="#94a3b8" rx="1" opacity="0.4"/>

  <rect x="104" y="28" width="46" height="26" fill="#1e293b" rx="3" stroke="#64748b" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="107" y="31" width="20" height="4" fill="#3b82f6" rx="1" opacity="0.7"/>
  <rect x="107" y="38" width="30" height="5" fill="#f8fafc" rx="1" opacity="0.5"/>
  <rect x="107" y="45" width="14" height="3" fill="#94a3b8" rx="1" opacity="0.4"/>

  <rect x="154" y="28" width="58" height="26" fill="#1e293b" rx="3" stroke="#64748b" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="157" y="31" width="25" height="4" fill="#3b82f6" rx="1" opacity="0.7"/>
  <rect x="157" y="38" width="35" height="5" fill="#f8fafc" rx="1" opacity="0.5"/>
  <rect x="157" y="45" width="18" height="3" fill="#94a3b8" rx="1" opacity="0.4"/>

  <!-- Row 2: big card (color-card-a-header-bg = #1e3a8a) -->
  <rect x="54" y="59" width="158" height="30" fill="#1e293b" rx="3" stroke="#64748b" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="54" y="59" width="158" height="10" fill="#1e3a8a" rx="3 3 0 0" opacity="0.9"/>
  <rect x="58" y="62" width="50" height="4" fill="#eff6ff" rx="1" opacity="0.7"/>
  <!-- Table lines -->
  <rect x="58" y="73" width="75" height="3" fill="#f8fafc" rx="1" opacity="0.35"/>
  <rect x="58" y="79" width="60" height="3" fill="#f8fafc" rx="1" opacity="0.25"/>
  <rect x="58" y="85" width="70" height="3" fill="#f8fafc" rx="1" opacity="0.25"/>
  <rect x="145" y="73" width="40" height="3" fill="#94a3b8" rx="1" opacity="0.3"/>
  <rect x="145" y="79" width="30" height="3" fill="#94a3b8" rx="1" opacity="0.2"/>
  <rect x="145" y="85" width="35" height="3" fill="#94a3b8" rx="1" opacity="0.2"/>

  <!-- Bottom bar -->
  <rect x="54" y="94" width="158" height="32" fill="#1e293b" rx="3" stroke="#64748b" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="58" y="99" width="80" height="4" fill="#f8fafc" rx="1" opacity="0.4"/>
  <rect x="58" y="107" width="60" height="3" fill="#94a3b8" rx="1" opacity="0.3"/>
  <rect x="58" y="113" width="70" height="3" fill="#94a3b8" rx="1" opacity="0.3"/>
  <!-- Button -->
  <rect x="170" y="100" width="34" height="12" fill="#2563eb" rx="3" opacity="0.9"/>
  <rect x="174" y="104" width="26" height="3" fill="white" rx="1" opacity="0.8"/>
</svg>
