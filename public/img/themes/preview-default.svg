<svg xmlns="http://www.w3.org/2000/svg" width="220" height="130" viewBox="0 0 220 130">
  <!-- Background -->
  <rect width="220" height="130" fill="#e9ecef" rx="4"/>

  <!-- Sidebar (white: color-sidebar-bg = #ffffff) -->
  <rect x="0" y="0" width="48" height="130" fill="#ffffff" rx="4 0 0 4"/>

  <!-- Sidebar logo area (dark navy: color-sidebar-logo-bg = #0b1220) -->
  <rect x="6" y="8" width="36" height="18" fill="#0b1220" rx="3" opacity="0.95"/>
  <text x="24" y="20" text-anchor="middle" font-size="7" font-family="sans-serif" fill="white" font-weight="bold">APP</text>

  <!-- Sidebar menu items (active = color-sidebar-active-bg = #2563eb) -->
  <rect x="6" y="32" width="36" height="7" fill="#2563eb" rx="2"/>
  <!-- inactive (color-sidebar-text = #696a6b) -->
  <rect x="6" y="43" width="28" height="5" fill="#696a6b" rx="2" opacity="0.45"/>
  <rect x="6" y="52" width="32" height="5" fill="#696a6b" rx="2" opacity="0.45"/>
  <rect x="6" y="61" width="24" height="5" fill="#696a6b" rx="2" opacity="0.45"/>
  <rect x="6" y="70" width="30" height="5" fill="#696a6b" rx="2" opacity="0.45"/>
  <rect x="6" y="79" width="26" height="5" fill="#696a6b" rx="2" opacity="0.45"/>

  <!-- Navbar (color-navbar-bg = #ffffff, color-navbar-border = #e5e7eb) -->
  <rect x="48" y="0" width="172" height="22" fill="#ffffff" rx="0 4 0 0"/>
  <line x1="48" y1="22" x2="220" y2="22" stroke="#e5e7eb" stroke-width="0.5"/>
  <!-- Navbar avatar (color-avatar-bg = #2563eb) -->
  <circle cx="208" cy="11" r="7" fill="#2563eb" opacity="0.85"/>
  <!-- Navbar title (color-navbar-text = #1f2937) -->
  <rect x="56" y="8" width="60" height="6" fill="#1f2937" rx="2" opacity="0.6"/>

  <!-- Row 1: stat cards (color-card-bg = #ffffff, color-card-border = #e5e7eb) -->
  <rect x="54" y="28" width="46" height="26" fill="#ffffff" rx="3" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="57" y="31" width="20" height="4" fill="#2563eb" rx="1" opacity="0.7"/>
  <rect x="57" y="38" width="30" height="5" fill="#111827" rx="1" opacity="0.5"/>
  <rect x="57" y="45" width="14" height="3" fill="#6b7280" rx="1" opacity="0.4"/>

  <rect x="104" y="28" width="46" height="26" fill="#ffffff" rx="3" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="107" y="31" width="20" height="4" fill="#2563eb" rx="1" opacity="0.7"/>
  <rect x="107" y="38" width="30" height="5" fill="#111827" rx="1" opacity="0.5"/>
  <rect x="107" y="45" width="14" height="3" fill="#6b7280" rx="1" opacity="0.4"/>

  <rect x="154" y="28" width="58" height="26" fill="#ffffff" rx="3" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="157" y="31" width="25" height="4" fill="#2563eb" rx="1" opacity="0.7"/>
  <rect x="157" y="38" width="35" height="5" fill="#111827" rx="1" opacity="0.5"/>
  <rect x="157" y="45" width="18" height="3" fill="#6b7280" rx="1" opacity="0.4"/>

  <!-- Row 2: big card (color-card-a-header-bg = #2563eb) -->
  <rect x="54" y="59" width="158" height="30" fill="#ffffff" rx="3" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="54" y="59" width="158" height="10" fill="#2563eb" rx="3 3 0 0"/>
  <rect x="58" y="62" width="50" height="4" fill="#ffffff" rx="1" opacity="0.85"/>
  <!-- Table lines -->
  <rect x="58" y="73" width="75" height="3" fill="#111827" rx="1" opacity="0.35"/>
  <rect x="58" y="79" width="60" height="3" fill="#111827" rx="1" opacity="0.25"/>
  <rect x="58" y="85" width="70" height="3" fill="#111827" rx="1" opacity="0.25"/>
  <rect x="145" y="73" width="40" height="3" fill="#6b7280" rx="1" opacity="0.3"/>
  <rect x="145" y="79" width="30" height="3" fill="#6b7280" rx="1" opacity="0.2"/>
  <rect x="145" y="85" width="35" height="3" fill="#6b7280" rx="1" opacity="0.2"/>

  <!-- Bottom bar -->
  <rect x="54" y="94" width="158" height="32" fill="#ffffff" rx="3" stroke="#e5e7eb" stroke-width="0.5"/>
  <rect x="58" y="99" width="80" height="4" fill="#111827" rx="1" opacity="0.4"/>
  <rect x="58" y="107" width="60" height="3" fill="#6b7280" rx="1" opacity="0.3"/>
  <rect x="58" y="113" width="70" height="3" fill="#6b7280" rx="1" opacity="0.3"/>
  <!-- Button (color-primary = #2563eb) -->
  <rect x="170" y="100" width="34" height="12" fill="#2563eb" rx="3" opacity="0.9"/>
  <rect x="174" y="104" width="26" height="3" fill="white" rx="1" opacity="0.8"/>
</svg>
