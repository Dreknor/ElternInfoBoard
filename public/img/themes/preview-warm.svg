<svg xmlns="http://www.w3.org/2000/svg" width="220" height="130" viewBox="0 0 220 130">
  <!-- Background (warm tan to contrast cream sidebar) -->
  <rect width="220" height="130" fill="#d4b9a7" rx="4"/>

  <!-- Sidebar (color-sidebar-bg = #f5ece5 cream) -->
  <rect x="0" y="0" width="48" height="130" fill="#f5ece5" rx="4 0 0 4"/>

  <!-- Sidebar logo area (color-primary = #ffb088 peach as logo box) -->
  <rect x="6" y="8" width="36" height="18" fill="#ffb088" rx="3" opacity="0.9"/>
  <text x="24" y="20" text-anchor="middle" font-size="7" font-family="sans-serif" fill="#5c463c" font-weight="bold">APP</text>

  <!-- Sidebar menu items (active = color-sidebar-active-bg = #ffb088) -->
  <rect x="6" y="32" width="36" height="7" fill="#ffb088" rx="2"/>
  <!-- inactive (color-sidebar-text = #785c4d) -->
  <rect x="6" y="43" width="28" height="5" fill="#785c4d" rx="2" opacity="0.4"/>
  <rect x="6" y="52" width="32" height="5" fill="#785c4d" rx="2" opacity="0.4"/>
  <rect x="6" y="61" width="24" height="5" fill="#785c4d" rx="2" opacity="0.4"/>
  <rect x="6" y="70" width="30" height="5" fill="#785c4d" rx="2" opacity="0.4"/>
  <rect x="6" y="79" width="26" height="5" fill="#785c4d" rx="2" opacity="0.4"/>

  <!-- Navbar (color-navbar-bg = #ffffff) -->
  <rect x="48" y="0" width="172" height="22" fill="#ffffff" rx="0 4 0 0"/>
  <line x1="48" y1="22" x2="220" y2="22" stroke="#e8dbce" stroke-width="0.5" opacity="0.5"/>
  <!-- Navbar avatar -->
  <circle cx="208" cy="11" r="7" fill="#ffb088" opacity="0.9"/>
  <!-- Navbar title -->
  <rect x="56" y="8" width="60" height="6" fill="#785c4d" rx="2" opacity="0.6"/>

  <!-- Row 1: stat cards (color-card-bg = #ffffff, color-card-border = #f0e5df) -->
  <rect x="54" y="28" width="46" height="26" fill="#ffffff" rx="3" stroke="#92400e" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="57" y="31" width="20" height="4" fill="#ffb088" rx="1" opacity="0.8"/>
  <rect x="57" y="38" width="30" height="5" fill="#5c463c" rx="1" opacity="0.5"/>
  <rect x="57" y="45" width="14" height="3" fill="#8c7368" rx="1" opacity="0.4"/>

  <rect x="104" y="28" width="46" height="26" fill="#ffffff" rx="3" stroke="#92400e" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="107" y="31" width="20" height="4" fill="#ffb088" rx="1" opacity="0.8"/>
  <rect x="107" y="38" width="30" height="5" fill="#5c463c" rx="1" opacity="0.5"/>
  <rect x="107" y="45" width="14" height="3" fill="#8c7368" rx="1" opacity="0.4"/>

  <rect x="154" y="28" width="58" height="26" fill="#ffffff" rx="3" stroke="#92400e" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="157" y="31" width="25" height="4" fill="#ffb088" rx="1" opacity="0.8"/>
  <rect x="157" y="38" width="35" height="5" fill="#5c463c" rx="1" opacity="0.5"/>
  <rect x="157" y="45" width="18" height="3" fill="#8c7368" rx="1" opacity="0.4"/>

  <!-- Row 2: big card (color-card-a-header-bg = #ffb088) -->
  <rect x="54" y="59" width="158" height="30" fill="#ffffff" rx="3" stroke="#92400e" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="54" y="59" width="158" height="10" fill="#ffb088" rx="3 3 0 0" opacity="0.9"/>
  <rect x="58" y="62" width="50" height="4" fill="#5c463c" rx="1" opacity="0.7"/>
  <!-- Table lines -->
  <rect x="58" y="73" width="75" height="3" fill="#5c463c" rx="1" opacity="0.35"/>
  <rect x="58" y="79" width="60" height="3" fill="#5c463c" rx="1" opacity="0.25"/>
  <rect x="58" y="85" width="70" height="3" fill="#5c463c" rx="1" opacity="0.25"/>
  <rect x="145" y="73" width="40" height="3" fill="#8c7368" rx="1" opacity="0.3"/>
  <rect x="145" y="79" width="30" height="3" fill="#8c7368" rx="1" opacity="0.2"/>
  <rect x="145" y="85" width="35" height="3" fill="#8c7368" rx="1" opacity="0.2"/>

  <!-- Bottom bar -->
  <rect x="54" y="94" width="158" height="32" fill="#ffffff" rx="3" stroke="#92400e" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="58" y="99" width="80" height="4" fill="#5c463c" rx="1" opacity="0.4"/>
  <rect x="58" y="107" width="60" height="3" fill="#8c7368" rx="1" opacity="0.3"/>
  <rect x="58" y="113" width="70" height="3" fill="#8c7368" rx="1" opacity="0.3"/>
  <!-- Button -->
  <rect x="170" y="100" width="34" height="12" fill="#ffb088" rx="3" opacity="0.9"/>
  <rect x="174" y="104" width="26" height="3" fill="#5c463c" rx="1" opacity="0.8"/>
</svg>
